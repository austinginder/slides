<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Austin Ginder / Slides &amp; Talks</title>
<link rel="icon" href="favicon.ico">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Newsreader:ital,opsz@1,6..72&display=swap" rel="stylesheet">
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>
  :root {
    --bg: #0c0c0e; --panel: #16161a; --line: rgba(245,242,234,0.08); --line2: rgba(245,242,234,0.06);
    --text: #f5f2ea; --muted: #9a978f; --muted2: #7d7a73; --faint: #55544e;
    --glow1: rgba(233,161,60,0.13); --glow2: rgba(233,161,60,0.05); --hover: rgba(233,161,60,0.07);
    --dot: rgba(245,242,234,0.05); --header-bg: rgba(12,12,14,0.72); --controls-bg: rgba(12,12,14,0.82);
    --input-bg: #16161a; --accent: #e9a13c; --accent-ink: #0c0c0e; --illo: rgba(233,161,60,0.85);
  }
  @media (prefers-color-scheme: light) {
    :root:not([data-theme]) {
      --bg: #f3ecdd; --panel: #fbf7ee; --line: rgba(23,42,55,0.15); --line2: rgba(23,42,55,0.09);
      --text: #16262f; --muted: #566670; --muted2: #74838b; --faint: #a6afb2;
      --glow1: rgba(176,106,18,0.16); --glow2: rgba(23,52,80,0.06); --hover: rgba(176,106,18,0.10);
      --dot: rgba(23,42,55,0.07); --header-bg: rgba(243,236,221,0.80); --controls-bg: rgba(243,236,221,0.86);
      --input-bg: #fbf7ee; --accent: #b06a12; --accent-ink: #fbf7ee; --illo: rgba(176,106,18,0.9);
    }
  }
  :root[data-theme="light"] {
    --bg: #f3ecdd; --panel: #fbf7ee; --line: rgba(23,42,55,0.15); --line2: rgba(23,42,55,0.09);
    --text: #16262f; --muted: #566670; --muted2: #74838b; --faint: #a6afb2;
    --glow1: rgba(176,106,18,0.16); --glow2: rgba(23,52,80,0.06); --hover: rgba(176,106,18,0.10);
    --dot: rgba(23,42,55,0.07); --header-bg: rgba(243,236,221,0.80); --controls-bg: rgba(243,236,221,0.86);
    --input-bg: #fbf7ee; --accent: #b06a12; --accent-ink: #fbf7ee; --illo: rgba(176,106,18,0.9);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body { margin: 0; background: var(--bg); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; transition: background 0.35s ease; }
  a { color: inherit; text-decoration: none; }
  a:visited { color: inherit; }
  a:visited span { color: inherit; }
  a:hover { color: var(--accent); }
  ::selection { background: var(--accent); color: var(--accent-ink); }
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--faint); border: 3px solid var(--bg); border-radius: 10px; }
  input::placeholder { color: var(--muted2); }
  [x-cloak] { display: none !important; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes bob { 0%,100% { transform: translateY(0) rotate(-3deg); } 50% { transform: translateY(-6px) rotate(3deg); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* Hover / focus states (ported from the design's style-hover attributes) */
  .hdr-btn:hover { color: var(--accent) !important; border-color: var(--accent) !important; }
  .footer-link:hover { color: var(--accent) !important; }
  .search-input:focus { border-color: var(--accent) !important; box-shadow: 0 0 0 3px var(--hover); }
  .talk-row:hover { background: var(--hover) !important; box-shadow: inset 3px 0 0 var(--accent); transform: translateX(4px); }
</style>
</head>
<body x-data="slidesApp()" x-init="init()" x-cloak>
<div style="position: relative; min-height: 100vh; background: radial-gradient(1200px 620px at 82% -8%, var(--glow1), transparent 60%), radial-gradient(900px 520px at -5% 2%, var(--glow2), transparent 55%), var(--bg); color: var(--text); font-family: 'Space Grotesk', system-ui, sans-serif; overflow-x: hidden; transition: background 0.35s ease, color 0.35s ease;">

  <div style="position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.6; background-image: radial-gradient(var(--dot) 1px, transparent 1px); background-size: 26px 26px; mask-image: linear-gradient(180deg, #000 0%, transparent 62%); -webkit-mask-image: linear-gradient(180deg, #000 0%, transparent 62%);"></div>

  <!-- Header -->
  <header style="position: sticky; top: 0; z-index: 30; backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); background: var(--header-bg); border-bottom: 1px solid var(--line);">
    <div style="max-width: 1080px; margin: 0 auto; padding: 0 24px; min-height: 64px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;">
      <a href="#top" style="display: flex; align-items: center; gap: 12px; padding: 12px 0;">
        <span style="display: inline-flex; align-items: center; justify-content: center; width: 36px; height: 36px; border-radius: 10px; background: var(--accent); color: var(--accent-ink);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="4.4" r="1.9"/><path d="M12 6.3V21"/><path d="M7.6 10.6h8.8"/><path d="M4 13.5a8 8 0 0 0 16 0"/><path d="M4 13.5l-2.1.5M4 13.5l1.5 1.9M20 13.5l2.1.5M20 13.5l-1.5 1.9"/></svg>
        </span>
        <span style="font-size: 15px; font-weight: 500; letter-spacing: 0.01em;">Austin Ginder <span style="color: var(--muted2);">/ Slides</span></span>
      </a>
      <div style="display: flex; align-items: center; gap: 10px;">
        <button @click="openPalette()" title="Command palette" class="hdr-btn" style="display: inline-flex; align-items: center; gap: 9px; font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.03em; color: var(--muted); padding: 8px 11px; border: 1px solid var(--line); border-radius: 9px; background: transparent; cursor: pointer;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.2-5.2M17 10a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <span style="border: 1px solid var(--line); border-radius: 5px; padding: 1px 6px; font-size: 11px;">⌘K</span>
        </button>
        <div style="display: inline-flex; padding: 4px; background: var(--input-bg); border: 1px solid var(--line); border-radius: 10px; gap: 3px;">
          <button @click="pickTheme('system')" title="Match system" :style="themeBtnStyle('system')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="8.5"/><path d="M12 3.5a8.5 8.5 0 0 0 0 17z" fill="currentColor" stroke="none"/></svg></button>
          <button @click="pickTheme('light')" title="Light" :style="themeBtnStyle('light')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg></button>
          <button @click="pickTheme('dark')" title="Dark" :style="themeBtnStyle('dark')"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.4 15.4A8.5 8.5 0 1 1 8.6 3.6a6.6 6.6 0 0 0 11.8 11.8z"/></svg></button>
        </div>
        <a href="https://github.com/austinginder/slides/" target="_blank" rel="noopener noreferrer" class="hdr-btn" style="display: inline-flex; align-items: center; gap: 8px; font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: 0.05em; color: var(--muted); padding: 8px 13px; border: 1px solid var(--line); border-radius: 9px;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path fill-rule="evenodd" clip-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
          <span>SOURCE</span>
        </a>
      </div>
    </div>
  </header>

  <!-- Hero -->
  <section id="top" style="position: relative; z-index: 1; max-width: 1080px; margin: 0 auto; padding: 88px 24px 20px; animation: fadeUp 0.7s ease both;">
    <svg viewBox="0 0 200 200" fill="none" stroke="var(--illo)" style="position: absolute; top: 24px; right: -18px; width: clamp(150px, 26vw, 280px); height: clamp(150px, 26vw, 280px); opacity: 0.16; pointer-events: none; animation: spin 90s linear infinite;">
      <circle cx="100" cy="100" r="93" stroke-width="1"/><circle cx="100" cy="100" r="70" stroke-width="1"/><circle cx="100" cy="100" r="6" stroke-width="1.5"/>
      <path d="M100 8 L110 100 L100 192 L90 100 Z" stroke-width="1.2"/><path d="M8 100 L100 110 L192 100 L100 90 Z" stroke-width="1.2"/>
      <path d="M100 100 L148 52 M100 100 L148 148 M100 100 L52 148 M100 100 L52 52" stroke-width="0.8" opacity="0.6"/>
      <path d="M100 8 L106 26 L100 20 L94 26 Z" fill="var(--illo)" stroke="none"/>
    </svg>
    <div style="display: inline-flex; align-items: center; gap: 10px; font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.32em; color: var(--accent); text-transform: uppercase; margin-bottom: 24px;">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="4.4" r="1.9"/><path d="M12 6.3V21"/><path d="M7.6 10.6h8.8"/><path d="M4 13.5a8 8 0 0 0 16 0"/><path d="M4 13.5l-2.1.5M4 13.5l1.5 1.9M20 13.5l2.1.5M20 13.5l-1.5 1.9"/></svg>
      Presentation Archive
    </div>
    <h1 style="margin: 0; font-size: clamp(56px, 9.5vw, 128px); font-weight: 500; line-height: 0.9; letter-spacing: -0.04em; max-width: 12ch;">Slides &amp; Talks</h1>
    <p style="margin: 28px 0 0; max-width: 640px; font-family: 'Newsreader', Georgia, serif; font-style: italic; font-size: clamp(20px, 2.6vw, 27px); line-height: 1.45; color: var(--muted);">A running log of every talk I've given at WordPress meetups and WordCamps, charted by year and searchable in a keystroke.</p>

    <!-- Stats -->
    <div style="display: flex; flex-wrap: wrap; gap: 16px 60px; margin-top: 54px;">
      <div style="display: flex; flex-direction: column; gap: 7px;">
        <span style="font-size: clamp(34px, 5vw, 54px); font-weight: 600; letter-spacing: -0.03em; line-height: 1;" x-text="stats.talks"></span>
        <span style="font-family: 'JetBrains Mono', monospace; font-size: 12.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted2);">Talks</span>
      </div>
      <div style="display: flex; flex-direction: column; gap: 7px;">
        <span style="font-size: clamp(34px, 5vw, 54px); font-weight: 600; letter-spacing: -0.03em; line-height: 1;" x-text="stats.years"></span>
        <span style="font-family: 'JetBrains Mono', monospace; font-size: 12.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted2);">Years active</span>
      </div>
      <div style="display: flex; flex-direction: column; gap: 7px;">
        <span style="font-size: clamp(34px, 5vw, 54px); font-weight: 600; letter-spacing: -0.03em; line-height: 1;" x-text="stats.venues"></span>
        <span style="font-family: 'JetBrains Mono', monospace; font-size: 12.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted2);">Venues</span>
      </div>
      <div style="display: flex; flex-direction: column; gap: 7px;">
        <span style="font-size: clamp(34px, 5vw, 54px); font-weight: 600; letter-spacing: -0.03em; line-height: 1;" x-text="stats.since"></span>
        <span style="font-family: 'JetBrains Mono', monospace; font-size: 12.5px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted2);">First talk</span>
      </div>
    </div>

    <svg viewBox="0 0 1200 24" preserveAspectRatio="none" fill="none" stroke="var(--illo)" stroke-width="1.5" style="width: 100%; height: 22px; margin-top: 40px; opacity: 0.5;">
      <path d="M0 12 Q 25 2 50 12 T 100 12 T 150 12 T 200 12 T 250 12 T 300 12 T 350 12 T 400 12 T 450 12 T 500 12 T 550 12 T 600 12 T 650 12 T 700 12 T 750 12 T 800 12 T 850 12 T 900 12 T 950 12 T 1000 12 T 1050 12 T 1100 12 T 1150 12 T 1200 12"/>
    </svg>
  </section>

  <!-- Controls (sticky) -->
  <div style="position: sticky; top: 64px; z-index: 20; backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); background: var(--controls-bg); border-top: 1px solid var(--line2); border-bottom: 1px solid var(--line);">
    <div style="max-width: 1080px; margin: 0 auto; padding: 16px 24px 15px;">
      <div style="display: flex; flex-wrap: wrap; gap: 12px; align-items: center;">
        <div style="position: relative; flex: 1 1 280px; min-width: 220px;">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="var(--muted2)" stroke-width="2" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%);"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.2-5.2M17 10a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" placeholder="Search by title, venue or year…" x-model="query" class="search-input" style="width: 100%; padding: 14px 16px 14px 47px; background: var(--input-bg); border: 1px solid var(--line); border-radius: 12px; color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 16.5px; outline: none;" />
        </div>
      </div>
      <div style="display: flex; flex-wrap: wrap; gap: 7px; margin-top: 14px;">
        <template x-for="c in yearChips" :key="c.value">
          <button @click="yearFilter = c.value" :style="chipStyle(c.value)" x-text="c.label"></button>
        </template>
      </div>
    </div>
  </div>

  <!-- Content -->
  <main style="position: relative; z-index: 1; max-width: 900px; margin: 0 auto; padding: 40px 24px 30px;">
    <div style="font-family: 'JetBrains Mono', monospace; font-size: 13.5px; letter-spacing: 0.1em; color: var(--muted2); margin-bottom: 8px;" x-text="resultLabel"></div>

    <template x-for="group in groups" :key="group.year">
      <section style="margin-top: 44px; animation: fadeIn 0.5s ease both;">
        <div style="display: flex; align-items: baseline; gap: 18px; padding-bottom: 11px; border-bottom: 1px solid var(--line);">
          <h2 style="margin: 0; font-size: clamp(38px, 5.5vw, 60px); font-weight: 600; letter-spacing: -0.03em; line-height: 1;" x-text="group.year"></h2>
          <span style="font-family: 'JetBrains Mono', monospace; font-size: 13px; letter-spacing: 0.08em; color: var(--muted2);" x-text="group.countLabel"></span>
        </div>

        <template x-for="item in group.items" :key="item.href">
          <a :href="item.href" target="_blank" rel="noopener noreferrer" class="talk-row" style="display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 18px; padding: 22px 14px 22px 12px; border-bottom: 1px solid var(--line2); border-radius: 10px; color: var(--text); transition: background 0.2s ease, box-shadow 0.2s ease, transform 0.2s ease;">
            <span style="min-width: 0;">
              <span style="display: block; font-size: clamp(23px, 2.8vw, 29px); font-weight: 500; letter-spacing: -0.015em; line-height: 1.25; color: var(--text);" x-text="item.title"></span>
              <span style="display: inline-flex; align-items: center; gap: 8px; margin-top: 11px; font-family: 'JetBrains Mono', monospace; font-size: 13.5px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted);">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6.3 7-11.5A7 7 0 0 0 5 9.5C5 14.7 12 21 12 21z"/><circle cx="12" cy="9.5" r="2.5"/></svg>
                <span x-text="item.place"></span>
              </span>
            </span>
            <span style="display: inline-flex; align-items: center; gap: 16px; white-space: nowrap;">
              <span style="font-family: 'JetBrains Mono', monospace; font-size: 15px; color: var(--muted);" x-text="item.date"></span>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--faint)" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14M13 6l6 6-6 6"/></svg>
            </span>
          </a>
        </template>
      </section>
    </template>

    <template x-if="isEmpty">
      <div style="text-align: center; padding: 80px 20px; border: 1px dashed var(--line); border-radius: 16px; margin-top: 44px;">
        <svg width="60" height="60" viewBox="0 0 48 48" fill="none" stroke="var(--illo)" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" style="opacity: 0.7; margin-bottom: 8px; animation: bob 4s ease-in-out infinite;">
          <path d="M14 42h20"/><path d="M17 42l1.4-16M31 42l-1.4-16"/><path d="M18.4 26h11.2M19 20h10M19.6 14.5h8.8"/><path d="M20.4 14.5l3.6-5 3.6 5"/><path d="M24 9.5V6"/><path d="M20.4 8l-3.4-1M27.6 8l3.4-1" opacity="0.7"/><circle cx="24" cy="17" r="1.1" fill="var(--illo)" stroke="none"/>
        </svg>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 13.5px; letter-spacing: 0.1em; color: var(--accent); text-transform: uppercase;">Nothing on the horizon</div>
        <p style="margin: 12px 0 0; font-family: 'Newsreader', serif; font-style: italic; font-size: 21px; color: var(--muted);" x-text="emptyMsg"></p>
      </div>
    </template>
  </main>

  <!-- Footer -->
  <footer style="position: relative; z-index: 1; max-width: 900px; margin: 30px auto 0; padding: 44px 24px 72px; border-top: 1px solid var(--line2);">
    <div style="display: flex; flex-wrap: wrap; gap: 14px; justify-content: space-between; align-items: center; font-family: 'JetBrains Mono', monospace; font-size: 12.5px; letter-spacing: 0.06em; color: var(--muted2);">
      <span style="display: inline-flex; align-items: center; gap: 11px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="animation: spin 60s linear infinite;"><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="8.6"/><path d="M12 3.4V1M12 23v-2.4M3.4 12H1M23 12h-2.4M6 6L4.2 4.2M19.8 19.8 18 18M18 6l1.8-1.8M4.2 19.8 6 18" stroke-linecap="round"/></svg>
        WORDPRESS MEETUPS &amp; WORDCAMPS · SINCE 2015
      </span>
      <a href="https://austinginder.com" target="_blank" rel="noopener noreferrer" class="footer-link" style="color: var(--muted2);">AUSTINGINDER.COM ↗</a>
    </div>
  </footer>

  <!-- Command palette -->
  <template x-if="paletteOpen">
    <div @click="closePalette()" style="position: fixed; inset: 0; z-index: 100; background: rgba(6,6,9,0.55); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); display: flex; align-items: flex-start; justify-content: center; padding: 12vh 20px 24px; animation: fadeIn 0.16s ease both;">
      <div @click.stop style="width: 100%; max-width: 640px; background: var(--panel); border: 1px solid var(--line); border-radius: 18px; box-shadow: 0 34px 90px rgba(0,0,0,0.55); overflow: hidden; animation: fadeUp 0.2s ease both;">
        <div style="display: flex; align-items: center; gap: 13px; padding: 17px 19px; border-bottom: 1px solid var(--line);">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" style="flex-shrink: 0;"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.2-5.2M17 10a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input id="cmdk-input" type="text" placeholder="Search talks or run a command…" x-model="paletteQuery" @input="paletteIndex = 0" autocomplete="off" style="flex: 1; min-width: 0; background: transparent; border: none; outline: none; color: var(--text); font-family: 'Space Grotesk', sans-serif; font-size: 18.5px;" />
          <span style="flex-shrink: 0; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted2); border: 1px solid var(--line); border-radius: 6px; padding: 3px 7px;">ESC</span>
        </div>
        <div style="max-height: 52vh; overflow-y: auto; padding: 8px;">
          <template x-for="(c, i) in paletteItems" :key="i">
            <div>
              <template x-if="c.heading">
                <div style="font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted2); padding: 13px 13px 6px;" x-text="c.heading"></div>
              </template>
              <div @click="activatePalette(i)" @mouseenter="paletteIndex = i" :style="c.style">
                <span :style="c.glyphStyle" x-text="c.glyph"></span>
                <span style="min-width: 0; flex: 1;">
                  <span style="display: block; font-size: 16.5px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" x-text="c.label"></span>
                  <span style="display: block; margin-top: 2px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" x-text="c.sub"></span>
                </span>
                <span style="flex-shrink: 0; font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 0.08em; color: var(--muted2); border: 1px solid var(--line); border-radius: 6px; padding: 3px 7px;" x-text="c.tag"></span>
              </div>
            </div>
          </template>
          <template x-if="paletteItems.length === 0">
            <div style="padding: 40px 16px; text-align: center; font-family: 'Newsreader', serif; font-style: italic; font-size: 18px; color: var(--muted);">Nothing matches. Try another term.</div>
          </template>
        </div>
        <div style="display: flex; gap: 18px; padding: 12px 18px; border-top: 1px solid var(--line); font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 0.04em; color: var(--muted2);">
          <span>↑↓ navigate</span><span>↵ open</span><span>esc close</span>
        </div>
      </div>
    </div>
  </template>

</div>

<script>
function slidesApp() {
  return {
    query: '',
    yearFilter: 'all',
    theme: 'system',
    paletteOpen: false,
    paletteQuery: '',
    paletteIndex: 0,

    items: [
      { date: "Sep 23rd, 2026", place: "LoopConf 2026", title: "Running Managed Hosting as a Company of One", href: "2026-09-23-loop-conf/" },
      { date: "Jul 16th, 2026", place: "WordPress Lancaster Meetup", title: "Build Anything With Claude And WordPress", href: "2026-07-16 Build Anything With Claude And WordPress/" },
      { date: "Apr 16th, 2026", place: "WordPress Lancaster Meetup", title: "WordPress News Night", href: "2026-04-16 WordPress News Night/" },
      { date: "Jan 15th, 2026", place: "WordPress Lancaster Meetup", title: "Everything Changing with AI", href: "2026-01-15 Everything Changing with AI/" },
      { date: "Jun 24th, 2025", place: "WordPress Lancaster Meetup", title: "Building a WordPress Maintenance CLI with AI", href: "2025-06-24 Building a WordPress Maintenance CLI with AI/" },
      { date: "Jan 16th, 2025", place: "WordPress Lancaster Meetup", title: "Top WordPress Theme Picks For 2025", href: "2025-01-16 Top WordPress Theme Picks For 2025/" },
      { date: "Aug 15th, 2024", place: "WordPress Lancaster Meetup", title: "WordPress Performance Tips", href: "2024-08-15 WordPress Performance Tips/" },
      { date: "May 16th, 2024", place: "WordPress Lancaster Meetup", title: "The Fastest Way To Migrate A WordPress Site", href: "2024-05-16 The Fastest Way To Migrate A WordPress Site/" },
      { date: "Mar 21st, 2024", place: "WordPress Lancaster Meetup", title: "Exending Plugin Checksums", href: "2024-03-21 Exending Plugin Checksums/" },
      { date: "Feb 15th, 2024", place: "WordPress Lancaster Meetup", title: "ACF Updates + Bulk Email Requirements and other WordPress News", href: "2024-02-15 ACF Updates + Bulk Email Requirements and other WordPress News/" },
      { date: "Nov 16th, 2023", place: "WordPress Lancaster Meetup", title: "WordPress 6.4 Release", href: "2023-11-16 WordPress 6.4 Release/" },
      { date: "March 21st, 2023", place: "WordPress Lancaster Meetup", title: "Using Github To Self-Host Updates For WordPress Plugins", href: "2023-03-21 Using Github To Self-Host Updates For WordPress Plugins/" },
      { date: "Oct 18th, 2022", place: "Lancaster WordPress Community", title: "Build a website with Blocksy", href: "2022-10-18 Build a website with Blocksy/" },
      { date: "May 17th, 2022", place: "Lancaster WordPress Community", title: "WordPress 6.0 Preview", href: "2022-05-16 WordPress 6.0 Preview/" },
      { date: "October 19th, 2021", place: "Lancaster WordPress Community", title: "Building a Better WordPress Backup Tool", href: "2021-10-19 Building a Better WordPress Backup Tool/" },
      { date: "April 20th, 2021", place: "Lancaster WordPress Community", title: "Optimizing WordPress for Google Core Web Vitals", href: "2021-04-20 Optimizing WordPress for Google Core Web Vitals/" },
      { date: "July 13th, 2020", place: "Philly 'burbs WordPress Meetup", title: "Managing 1000+ WordPress Sites as a Solo Developer", href: "2020-07-13 Managing 1000+ WordPress Sites as a Solo Developer/" },
      { date: "March 14th, 2020", place: "WordCamp Lancaster 2020 (cancelled)", title: "Common WordPress Maintenance Woes", href: "2020-03-14 Common WordPress Maintenance Woes/" },
      { date: "Feburary 2nd, 2020", place: "WordPress Lancaster Meetup", title: "Lighting Faster WordPress Themes", href: "2020-02-20 Lighting Faster WordPress Themes/" },
      { date: "December 10th, 2019", place: "WordPress Lancaster Meetup", title: "Meet CaptainCore", href: "2019-12-10 Meet CaptainCore/" },
      { date: "September 19th, 2019", place: "WordPress Lancaster Meetup", title: "WordPress Lancaster Meetup", href: "2019-09-19 WordPress Lancaster Meetup/" },
      { date: "August 13th, 2019", place: "WordPress Lancaster Meetup", title: "Easily Avoidable Website Outages", href: "2019-08-13 Easily Avoidable Website Outages/" },
      { date: "June 20th, 2019", place: "WordPress Lancaster Meetup", title: "Introduction to WooCommerce Subscriptions", href: "2019-06-20 Introduction to WooCommerce Subscriptions/" },
      { date: "April 27th, 2019", place: "WordPress Lancaster Meetup", title: "The Lean Mean Maintenance Machine", href: "2019-04-27 The Lean Mean Maintenance Machine/" },
      { date: "March 21st, 2019", place: "WordPress Lancaster Meetup", title: "Meet CaptainCore", href: "2019-03-21 Meet CaptainCore/" },
      { date: "January 17th, 2019", place: "WordPress Lancaster Meetup", title: "Keeping your WordPress site secure, the basics", href: "2019-01-17 Keeping your WordPress site secure, the basics/" },
      { date: "November 15th, 2018", place: "WordPress Lancaster Meetup", title: "Upgrading to WordPress 5", href: "2018-11-15 Upgrading to WordPress 5/" },
      { date: "July 19th, 2018", place: "WordPress Lancaster Meetup", title: "Learning Vue.js as a WordPress Developer", href: "2018-07-19 Learning Vue.js as a WordPress developer/" },
      { date: "March 15th, 2018", place: "WordPress Lancaster Meetup", title: "Meet Gutenberg the new editor coming to WordPress", href: "2018-03-15 Meet Gutenberg the new editor coming to WordPress/" },
      { date: "August 17th, 2017", place: "WordPress Lancaster Meetup", title: "Starting a website with WordPress", href: "2017-08-17 Starting a website with WordPress/" },
      { date: "July 10th, 2017", place: "WordPress Lancaster Meetup", title: "WordPress 4.8 Release + Project Gutenberg", href: "2017-07-20 WordPress 4.8 Release + Project Gutenberg/" },
      { date: "May 4th, 2017", place: "WordCamp Lancaster 2017", title: "Staying Sane While Maintaining Hundreds of WordPress sites", href: "2017-03-04 Staying sane while maintaining hundreds of WordPress sites/" },
      { date: "August 8th, 2016", place: "Churchill Company Meetup", title: "5 Ways to Sink a Potentially Great Website", href: "2016-08-08 5 Ways to Sink a Potentially Great Website/" },
      { date: "May 19th, 2016", place: "WordPress Lancaster Meetup", title: "Selecting a theme", href: "2016-05-19 Selecting a theme/" },
      { date: "July 14th, 2015", place: "WordPress Lancaster Meetup", title: "Managed Hosting", href: "2015-07-14 Managed Hosting/" },
      { date: "May 12th, 2015", place: "WordPress Lancaster Meetup", title: "WooCommerce Essential Extensions", href: "2015-05-12 woocommerce-essential-ext/" },
    ],

    init() {
      this.applyTheme(this.theme);
      window.addEventListener('keydown', (e) => {
        const k = (e.key || '').toLowerCase();
        if ((e.metaKey || e.ctrlKey) && k === 'k') { e.preventDefault(); this.togglePalette(); return; }
        if (!this.paletteOpen) return;
        if (k === 'escape') { e.preventDefault(); this.closePalette(); }
        else if (k === 'arrowdown') { e.preventDefault(); this.movePalette(1); }
        else if (k === 'arrowup') { e.preventDefault(); this.movePalette(-1); }
        else if (k === 'enter') { e.preventDefault(); this.activatePalette(this.paletteIndex); }
      });
    },

    yearOf(item) { const m = String(item.date).match(/\d{4}/); return m ? m[0] : ""; },

    applyTheme(theme) {
      const root = document.documentElement;
      if (theme === 'system') root.removeAttribute('data-theme');
      else root.setAttribute('data-theme', theme);
    },
    pickTheme(theme) { this.applyTheme(theme); this.theme = theme; },

    openPalette() {
      this.paletteOpen = true; this.paletteQuery = ''; this.paletteIndex = 0;
      this.$nextTick(() => { const el = document.getElementById('cmdk-input'); if (el) el.focus(); });
    },
    closePalette() { this.paletteOpen = false; },
    togglePalette() { this.paletteOpen ? this.closePalette() : this.openPalette(); },
    movePalette(d) { const n = this.buildPalette(this.paletteQuery).length; if (!n) return; this.paletteIndex = (this.paletteIndex + d + n) % n; },
    activatePalette(idx) { const items = this.buildPalette(this.paletteQuery); const it = items[idx]; if (!it) return; this.paletteOpen = false; it.run(); },

    buildPalette(rawq) {
      const q = (rawq || '').trim().toLowerCase();
      const acts = [];
      const add = (label, sub, run, kw) => acts.push({ kind: 'action', label, sub, run, tag: 'RUN', glyph: '›', kw: (label + ' ' + (kw || '')).toLowerCase() });
      add('Match system theme', 'Follow your OS appearance', () => this.pickTheme('system'), 'auto default light dark');
      add('Switch to Light', 'Parchment chart theme', () => this.pickTheme('light'), 'day');
      add('Switch to Dark', 'Ink theme', () => this.pickTheme('dark'), 'night');
      add('Show all years', 'Clear the year filter', () => { this.yearFilter = 'all'; }, 'reset');
      const years = [];
      for (const it of this.items) { const y = this.yearOf(it); if (!years.includes(y)) years.push(y); }
      years.forEach(y => add('Filter to ' + y, 'Show only ' + y + ' talks', () => { this.yearFilter = y; }, 'year'));
      add('View source on GitHub', 'github.com/austinginder/slides', () => window.open('https://github.com/austinginder/slides/', '_blank'), 'repo code');

      const talks = this.items.map(it => ({ kind: 'talk', label: it.title, sub: it.date + ' · ' + it.place, run: () => window.open(it.href, '_blank'), tag: 'OPEN', glyph: '↗', kw: (it.title + ' ' + it.place + ' ' + it.date).toLowerCase() }));

      const fa = q ? acts.filter(a => a.kw.includes(q)) : acts.slice(0, 6);
      const ft = q ? talks.filter(t => t.kw.includes(q)) : talks;
      const out = [];
      fa.forEach((a, i) => out.push({ ...a, heading: i === 0 ? 'Commands' : null }));
      ft.forEach((t, i) => out.push({ ...t, heading: i === 0 ? 'Talks' : null }));
      return out;
    },

    themeBtnStyle(t) {
      const base = "display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 30px; border-radius: 7px; border: none; cursor: pointer; transition: all 0.18s ease;";
      return base + (this.theme === t ? " background: var(--accent); color: var(--accent-ink);" : " background: transparent; color: var(--muted);");
    },
    chipStyle(value) {
      const base = "font-family: 'JetBrains Mono', monospace; font-size: 13.5px; letter-spacing: 0.05em; padding: 7px 13px; border-radius: 8px; border: 1px solid var(--line); transition: all 0.18s ease; cursor: pointer;";
      const active = " background: var(--accent); color: var(--accent-ink); border-color: var(--accent);";
      const idle = " background: transparent; color: var(--muted);";
      return base + (this.yearFilter === value ? active : idle);
    },

    get filtered() {
      const q = this.query.trim().toLowerCase();
      return this.items.filter(i => {
        if (this.yearFilter !== 'all' && this.yearOf(i) !== this.yearFilter) return false;
        if (!q) return true;
        return i.title.toLowerCase().includes(q) || i.place.toLowerCase().includes(q) || i.date.toLowerCase().includes(q);
      });
    },
    get stats() {
      const yearsSet = new Set(this.items.map(i => this.yearOf(i)));
      const venuesSet = new Set(this.items.map(i => i.place));
      const yearNums = Array.from(yearsSet).map(Number);
      return { talks: this.items.length, years: yearsSet.size, venues: venuesSet.size, since: String(Math.min(...yearNums)) };
    },
    get groups() {
      const order = [];
      const map = {};
      for (const it of this.filtered) {
        const y = this.yearOf(it);
        if (!map[y]) { map[y] = []; order.push(y); }
        map[y].push(it);
      }
      return order.map(y => ({
        year: y,
        countLabel: map[y].length === 1 ? '1 talk' : map[y].length + ' talks',
        items: map[y],
      }));
    },
    get yearChips() {
      const allYears = [];
      for (const it of this.items) { const y = this.yearOf(it); if (!allYears.includes(y)) allYears.push(y); }
      return [{ label: 'All', value: 'all' }, ...allYears.map(y => ({ label: y, value: y }))];
    },
    get resultLabel() {
      const q = this.query.trim();
      const n = this.filtered.length;
      const scope = this.yearFilter !== 'all' ? this.yearFilter : 'All years';
      if (q) return n + (n === 1 ? ' result' : ' results') + ' · ' + scope;
      if (this.yearFilter !== 'all') return this.yearFilter + ' · ' + n + (n === 1 ? ' talk' : ' talks');
      return 'Full index · ' + n + ' presentations';
    },
    get emptyMsg() {
      const q = this.query.trim();
      return q
        ? ('No talks match "' + q + '"' + (this.yearFilter !== 'all' ? ' in ' + this.yearFilter : '') + '. Try another course.')
        : 'No talks logged for this year.';
    },
    get isEmpty() { return this.filtered.length === 0; },
    get paletteItems() {
      const idx = this.paletteIndex;
      const rowBase = "display: flex; align-items: center; gap: 13px; padding: 12px 13px; border-radius: 11px; cursor: pointer; transition: background 0.12s ease;";
      return this.buildPalette(this.paletteQuery).map((c, i) => ({
        ...c,
        glyphStyle: "flex-shrink: 0; display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 8px; font-family: 'JetBrains Mono', monospace; font-size: 15px; background: " + (i === idx ? 'var(--accent)' : 'var(--line2)') + "; color: " + (i === idx ? 'var(--accent-ink)' : 'var(--muted)') + ";",
        style: rowBase + (i === idx ? " background: var(--hover); box-shadow: inset 2px 0 0 var(--accent);" : " background: transparent;"),
      }));
    },
  };
}
</script>
